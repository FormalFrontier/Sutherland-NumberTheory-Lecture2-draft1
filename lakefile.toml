name = "Sutherland-NumberTheory-Lecture2"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["SutherlandNumberTheoryLecture2"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "Sutherland-NumberTheory-Lecture1"
scope = "FormalFrontier"
git = "https://github.com/FormalFrontier/Sutherland-NumberTheory-Lecture1-draft2"
rev = "59bed456ddb1c2fcdd9db9a62280b8e7a7cc6242"

[[lean_lib]]
name = "SutherlandNumberTheoryLecture2"
